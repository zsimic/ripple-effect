[tox]
envlist = py{311,314}, coverage, style, typecheck, readme

[testenv]
setenv = COVERAGE_FILE={toxworkdir}/.coverage.{envname}
         PYTHONDONTWRITEBYTECODE=1
usedevelop = True
dependency_groups = test
commands = pytest {posargs:-vv --cov=src/ripple_effect tests}

[testenv:coverage]
setenv = COVERAGE_FILE={toxworkdir}/.coverage
skip_install = True
deps = coverage
commands = coverage combine
           coverage report -m
           coverage xml
           coverage html

[testenv:style]
skip_install = True
deps = ruff
commands = ruff check
           ruff format --diff

[testenv:reformat]
skip_install = True
deps = ruff
commands = ruff check --fix
           ruff format

[testenv:typecheck]
usedevelop = True
deps = pyright
commands = pyright

[testenv:readme]
skip_install = True
deps = uv
       twine
commands = uv build -q -o {env_dir}/dist
           twine check {env_dir}/dist/*

[coverage:run]
data_file = .tox/.coverage
source = src
patch = subprocess
sigterm = True

[coverage:xml]
output = .tox/test-reports/coverage.xml

[coverage:html]
directory = .tox/test-reports/htmlcov

[pytest]
cache_dir = .tox/pytest_cache
testpaths = tests
