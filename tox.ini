[tox]
envlist = py{310,314}, coverage, style, typecheck

[testenv]
setenv = COVERAGE_FILE={toxworkdir}/.coverage.{envname}
usedevelop = True
dependency_groups = test
commands = pytest {posargs:-vv --cov=src tests}

[testenv:coverage]
setenv = COVERAGE_FILE={toxworkdir}/.coverage
skip_install = True
deps = coverage
commands = coverage combine
           coverage report -m
           coverage xml
           coverage html

[testenv:style]
skip_install = True
deps = ruff
commands = ruff check
           ruff format --diff

[testenv:typecheck]
usedevelop = True
deps = pyright
commands = pyright

[testenv:reformat]
skip_install = True
deps = ruff
commands = ruff check --fix
           ruff format


[coverage:run]
concurrency =
    thread
patch = subprocess
[coverage:xml]
output = .tox/test-reports/coverage.xml
[coverage:html]
directory = .tox/test-reports/htmlcov
[pytest]
cache_dir = .tox/.cache
